name: Build Mod JAR

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            loom-cache
            loom-cache/remapped_mods

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle (with retry)
        run: |
          ./gradlew build --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4G" || \
          ./gradlew build --no-daemon --stacktrace -Dorg.gradle.jvmargs="-Xmx4G" --refresh-dependencies

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeaponSlotLocker
          path: build/libs/*.jar
